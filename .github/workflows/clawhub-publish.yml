name: Publish to ClawHub

on:
  pull_request:
    paths:
      - "**/SKILL.md"
      - ".github/workflows/clawhub-publish.yml"
  push:
    tags:
      - "**"  # Matches any tag like paperclip-sync/v1.0.0

# Controls permissions for CI
permissions:
  contents: read

jobs:
  # Validate skills on PR - dry run
  validate:
    if: github.event_name == 'pull_request'
    name: Validate Skills (${{ matrix.skill }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - skill: paperclip-sync
          - skill: task-assign
          - skill: company-status
          - skill: deploy-skill
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub

      - name: Validate skill structure
        run: |
          echo "Validating ${{ matrix.skill }}/SKILL.md..."
          # Check required sections exist
          REQUIRED_SECTIONS=("External Endpoints" "Security & Privacy" "Trust Statement")
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if grep -q "$section" "${{ matrix.skill }}/SKILL.md"; then
              echo "✓ $section found"
            else
              echo "✗ $section MISSING"
              exit 1
            fi
          done

      - name: Check for credential leaks
        run: |
          if grep -r "API_KEY\|TOKEN\|SECRET\|PASSWORD" "${{ matrix.skill }}/" --include="*.md" --include="*.sh" 2>/dev/null; then
            echo "⚠ WARNING: Potential credentials found - review carefully"
          fi
          # Ensure .gitignore exists and covers env files
          if [ -f ".gitignore" ]; then
            echo "✓ .gitignore exists"
          fi

      - name: Dry-run publish
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -n "$CLAWHUB_TOKEN" ]; then
            clawhub login --token "$CLAWHUB_TOKEN" --no-browser 2>/dev/null || true
            clawhub skill publish "./${{ matrix.skill }}" --dry-run --json || echo "Dry-run completed"
          else
            echo "CLAWHUB_TOKEN not set - skipping dry-run publish"
          fi

  # Publish skills on tag push
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish ${{ matrix.skill }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - skill: paperclip-sync
            slug: tpk-paperclip-sync
            name: "TPK Paperclip Sync"
            tags: tpk,paperclip,automation
          - skill: task-assign
            slug: tpk-task-assign
            name: "TPK Task Assign"
            tags: tpk,paperclip,task
          - skill: company-status
            slug: tpk-company-status
            name: "TPK Company Status"
            tags: tpk,paperclip,status
          - skill: deploy-skill
            slug: tpk-deploy-skill
            name: "TPK Deploy Skill"
            tags: tpk,claude-code,deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub

      - name: Publish skill
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # Extract version from tag (e.g., paperclip-sync/v1.0.0 -> 1.0.0)
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#*/}"

          echo "Publishing ${{ matrix.skill }}@$VERSION to ClawHub..."

          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

          RESULT=$(clawhub skill publish "./${{ matrix.skill }}" \
            --slug ${{ matrix.slug }} \
            --name "${{ matrix.name }}" \
            --version "$VERSION" \
            --tags ${{ matrix.tags }} \
            --json 2>&1)

          echo "Publish result: $RESULT"

  # Publish all skills with sync command
  publish-all:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Publish All Skills
    runs-on: ubuntu-latest
    # Only runs if no specific skill tag matched
    needs: publish
    if: needs.publish.result == 'skipped'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub

      - name: Publish all skills
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
          VERSION="${GITHUB_REF#refs/tags/v}"

          echo "Publishing all skills@$VERSION to ClawHub..."

          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

          for skill in paperclip-sync task-assign company-status deploy-skill; do
            echo "Publishing $skill..."
            clawhub skill publish "./$skill" \
              --slug "tpk-$skill" \
              --name "TPK $(echo $skill | sed 's/-/ /g' | sed 's/\b\(.\)/\U\1/g')" \
              --version "$VERSION" \
              --tags tpk,paperclip,automation \
              --json || echo "Failed to publish $skill"
          done
