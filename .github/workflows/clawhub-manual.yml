name: ClawHub Manual Publish

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill to publish'
        required: true
        type: choice
        options:
          - paperclip-sync
          - task-assign
          - company-status
          - deploy-skill
          - all
      version:
        description: 'Version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      bump:
        description: 'Auto bump version'
        type: choice
        required: false
        options:
          - none
          - patch
          - minor
          - major

jobs:
  publish:
    name: Publish ${{ inputs.skill == 'all' && 'All Skills' || inputs.skill }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub

      - name: Publish skill(s)
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"
          SKILL="${{ inputs.skill }}"

          clawhub login --token "$CLAWHUB_TOKEN" --no-browser

          if [ "$SKILL" == "all" ]; then
            for skill in paperclip-sync task-assign company-status deploy-skill; do
              echo "Publishing $skill@$VERSION..."
              clawhub skill publish "./$skill" \
                --slug "tpk-$skill" \
                --version "$VERSION" \
                --tags tpk,paperclip,automation \
                --json
            done
          else
            echo "Publishing $SKILL@$VERSION..."
            clawhub skill publish "./$SKILL" \
              --slug "tpk-$SKILL" \
              --version "$VERSION" \
              --tags tpk,paperclip,automation \
              --json
          fi

          echo "✅ Publish completed!"
