name: Inspect Skills

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - "**/SKILL.md"

jobs:
  inspect:
    name: Inspect ClawHub Skills
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - skill: paperclip-sync
            slug: tpk-paperclip-sync
          - skill: task-assign
            slug: tpk-task-assign
          - skill: company-status
            slug: tpk-company-status
          - skill: deploy-skill
            slug: tpk-deploy-skill
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ClawHub CLI
        run: |
          npm install -g clawhub

      - name: Inspect local skill
        run: |
          echo "=== Local SKILL.md Analysis ==="
          echo ""
          echo "File: ${{ matrix.skill }}/SKILL.md"
          echo ""
          # Extract and display metadata
          echo "--- Frontmatter ---"
          head -20 "${{ matrix.skill }}/SKILL.md"
          echo ""
          echo "--- Sections Check ---"
          for section in "External Endpoints" "Security & Privacy" "Trust Statement" "Environment Variables" "Usage"; do
            if grep -q "$section" "${{ matrix.skill }}/SKILL.md"; then
              echo "✓ $section"
            else
              echo "✗ $section MISSING"
            fi
          done

      - name: Check if skill exists on ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -n "$CLAWHUB_TOKEN" ]; then
            echo ""
            echo "=== ClawHub Remote Check ==="
            RESULT=$(clawhub inspect ${{ matrix.slug }} --json 2>&1 || echo "{}")
            echo "$RESULT" | head -20 || echo "Skill not found on ClawHub (will be new publish)"
          else
            echo "CLAWHUB_TOKEN not set - skipping remote check"
          fi

      - name: Security scan
        run: |
          echo ""
          echo "=== Security Checks ==="

          # Check for hardcoded secrets
          if grep -iE "(api[_-]?key|token|secret|password|credential)" "${{ matrix.skill }}/SKILL.md" | grep -v "PAPERCLIP_API_URL" | grep -v "\${{"; then
            echo "⚠ WARNING: Potential hardcoded credential reference found"
          else
            echo "✓ No obvious credential leaks"
          fi

          # Check for shell script security
          if [ -f "${{ matrix.skill }}/${{ matrix.skill }}.sh" ]; then
            if grep -q "set -euo pipefail" "${{ matrix.skill }}/${{ matrix.skill }}.sh"; then
              echo "✓ Shell script has safe error handling"
            else
              echo "⚠ Shell script missing 'set -euo pipefail'"
            fi
          fi
